<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://fonts.google.com/specimen/Inter">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Social links profile</title>
</head>
<body>
  <main id="root">
    <div class="card glow-primary">
      <div class="card__header">
        <div class="avatar__container">
          <img class="avatar" src="./assets/images/avatar-maria.jpeg" alt="profile-image">
        </div>
        <h1>Maria Velandia</h1>
        <h4 class="primary-color">Ottawa, Canada</h4>
      </div>
      <div class="card__body">
        <p>Hi, I’m Maria <br><br> 💖 a dreamer, <br> ☕ coffee lover, <br> 👩🏽‍💻 software developer, <br> 🤓 and lifelong learner. <br><br> I'd love to connect and collaborate with you. ❤️</p>
        <ul class="card__body__list">
          <li class="card__body__link">
            <a href="https://github.com/beltranfernanda" target="_blank" class="glow-primary">GitHub</a>
          </li>
          <li class="card__body__link">
            <a href="https://www.linkedin.com/in/beltranfernanda/" target="_blank" class="glow-primary">LinkedIn</a>
          </li>
          <li class="card__body__link">
            <a href="https://beltranfernanda.github.io/my-website/" target="_blank" class="glow-primary">Personal Site</a>
          </li>
          <!--
          <li class="card__body__link">
            <a href="#">Twitter</a>
          </li>
          <li class="card__body__link">
            <a href="#">Instagram</a>
          </li>
          -->
        </ul>
      </div>
    </div>
  </main>
  <div class="attribution hidden">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Maria Velandia</a>.
  </div>  
</body>
</html>
